name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0) - leave empty for auto-increment'
        required: false
        type: string
      version_type:
        description: 'Version increment type (if version is empty)'
        required: false
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  release:
    name: Create Release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate and Create Tag (Manual Trigger Only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          $inputVersion = "${{ github.event.inputs.version }}"

          if ([string]::IsNullOrWhiteSpace($inputVersion)) {
            # Auto-calculate version
            Write-Host "No version specified, calculating next version..."

            # Get the latest tag
            $latestTag = git tag --sort=-v:refname | Select-Object -First 1

            if ([string]::IsNullOrWhiteSpace($latestTag)) {
              # No tags exist, start with v1.0.0
              $version = "v1.0.0"
              Write-Host "No existing tags found, starting with $version"
            } else {
              Write-Host "Latest tag: $latestTag"

              # Parse version (remove 'v' prefix if present)
              $versionNum = $latestTag -replace '^v', ''
              $parts = $versionNum -split '\.'

              if ($parts.Count -lt 3) {
                Write-Host "Invalid tag format, starting with v1.0.0"
                $version = "v1.0.0"
              } else {
                $major = [int]$parts[0]
                $minor = [int]$parts[1]
                $patch = [int]$parts[2]

                # Increment based on type
                $incrementType = "${{ github.event.inputs.version_type }}"
                if ([string]::IsNullOrWhiteSpace($incrementType)) {
                  $incrementType = "patch"
                }

                switch ($incrementType) {
                  "major" {
                    $major++
                    $minor = 0
                    $patch = 0
                  }
                  "minor" {
                    $minor++
                    $patch = 0
                  }
                  default {
                    $patch++
                  }
                }

                $version = "v$major.$minor.$patch"
                Write-Host "Calculated next version: $version (increment type: $incrementType)"
              }
            }
          } else {
            $version = $inputVersion
            if (-not $version.StartsWith('v')) {
              $version = "v$version"
            }
            Write-Host "Using provided version: $version"
          }

          # Create and push tag
          Write-Host "Creating tag: $version"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a $version -m "Release $version"
          git push origin $version

          # Export version for later steps
          echo "RELEASE_VERSION=$version" >> $env:GITHUB_ENV
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup C++ Build Tools
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Build C++ Launcher
        working-directory: Tools/mho_launcher_cpp
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A Win32
          cmake --build build --config Release

      - name: Publish CLI (Windows x86)
        run: |
          dotnet publish Tools/Rathalos.CLI/Rathalos.CLI.csproj `
            -c Release `
            -r win-x86 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o release/CLI

      - name: Copy CLI libs folder
        run: |
          # Copy the libs folder (contains IFS2.dll) to the published CLI output
          Copy-Item -Path Tools/Rathalos.CLI/libs -Destination release/CLI/libs -Recurse -Force
          Write-Host "Copied libs folder to release/CLI/libs"

      - name: Publish World Console (Windows x64)
        run: |
          dotnet publish GUI/Rathalos.ConsoleUI.World/Rathalos.ConsoleUI.World.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o release/World

      - name: Publish Distributed (Windows x64)
        run: |
          dotnet publish GUI/Rathalos.Distributed/Rathalos.Distributed.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o release/Distributed

      - name: Copy C++ Launcher
        run: |
          New-Item -ItemType Directory -Force -Path release/Launcher
          Copy-Item -Path Tools/mho_launcher_cpp/build/Release/*.exe -Destination release/Launcher/
          Copy-Item -Path Tools/mho_launcher_cpp/build/Release/*.dll -Destination release/Launcher/ -ErrorAction SilentlyContinue

      - name: Create Release Packages
        run: |
          # Get version from environment variable (set by tag creation step) or tag ref
          if ($env:RELEASE_VERSION) {
            $version = $env:RELEASE_VERSION
            Write-Host "Using version from environment: $version"
          } elseif ($env:GITHUB_REF -match 'refs/tags/(.*)') {
            $version = $matches[1]
            Write-Host "Using version from tag ref: $version"
          } else {
            $version = "dev"
            Write-Host "No version found, using: $version"
          }

          # Create main README
          @"
          # Rathalos Release - $version

          ## Components

          This release includes the following separate packages:

          - **Rathalos-CLI-$version-win-x86.zip** - Command-line interface tool
          - **Rathalos-World-$version-win-x64.zip** - World server console UI
          - **Rathalos-Distributed-$version-win-x64.zip** - Distributed management UI
          - **Rathalos-Launcher-$version-win-x86.zip** - MHO game launcher

          ## Usage

          Download and extract the component(s) you need, then run the executable directly:
          - CLI: ``Rathalos.CLI.exe``
          - World: ``Rathalos.ConsoleUI.World.exe``
          - Distributed: ``Rathalos.Distributed.exe``
          - Launcher: ``mho_launcher.exe``

          All executables are self-contained and do not require .NET to be installed.

          ## Support

          - GitHub: https://github.com/MHO-Revival/Rathalos
          - Issues: https://github.com/MHO-Revival/Rathalos/issues
          "@ | Out-File -FilePath release/README.txt -Encoding UTF8

          # Create individual component READMEs and ZIPs

          # CLI Package
          @"
          # Rathalos CLI - $version

          Command-line interface tool for MHO server management and file operations.

          ## Features
          - XML Code Generator (T4 Templates)
          - IFS Archive Tools (Extract/Create/View)
          - MHO Client Launcher
          - Hosts File Configuration

          ## Usage
          Run ``Rathalos.CLI.exe`` to launch the interactive menu.

          ## Requirements
          - Windows x86/x64
          - No .NET installation required (self-contained)
          "@ | Out-File -FilePath release/CLI/README.txt -Encoding UTF8

          Write-Host "Creating CLI package: Rathalos-CLI-$version-win-x86.zip"
          Compress-Archive -Path release/CLI/* -DestinationPath "Rathalos-CLI-$version-win-x86.zip" -Force

          # World Package
          @"
          # Rathalos World Server - $version

          World server console UI for Monster Hunter Online.

          ## Usage
          Run ``Rathalos.ConsoleUI.World.exe`` to start the world server.

          ## Requirements
          - Windows x64
          - PostgreSQL database (configured via appsettings.json)
          - No .NET installation required (self-contained)
          "@ | Out-File -FilePath release/World/README.txt -Encoding UTF8

          Write-Host "Creating World package: Rathalos-World-$version-win-x64.zip"
          Compress-Archive -Path release/World/* -DestinationPath "Rathalos-World-$version-win-x64.zip" -Force

          # Distributed Package
          @"
          # Rathalos Distributed - $version

          Distributed management UI for MHO server infrastructure.

          ## Usage
          Run ``Rathalos.Distributed.exe`` to launch the management interface.

          ## Requirements
          - Windows x64
          - No .NET installation required (self-contained)
          "@ | Out-File -FilePath release/Distributed/README.txt -Encoding UTF8

          Write-Host "Creating Distributed package: Rathalos-Distributed-$version-win-x64.zip"
          Compress-Archive -Path release/Distributed/* -DestinationPath "Rathalos-Distributed-$version-win-x64.zip" -Force

          # Launcher Package
          @"
          # Rathalos MHO Launcher - $version

          Game launcher for Monster Hunter Online client.

          ## Usage
          Run ``mho_launcher.exe`` to launch the MHO client.

          ## Features
          - DLL injection support
          - Custom client modifications
          - Administrator privilege handling

          ## Requirements
          - Windows x86/x64
          - MHO client installation
          "@ | Out-File -FilePath release/Launcher/README.txt -Encoding UTF8

          Write-Host "Creating Launcher package: Rathalos-Launcher-$version-win-x86.zip"
          Compress-Archive -Path release/Launcher/* -DestinationPath "Rathalos-Launcher-$version-win-x86.zip" -Force

          Write-Host "All packages created successfully!"
          Write-Host "  - Rathalos-CLI-$version-win-x86.zip"
          Write-Host "  - Rathalos-World-$version-win-x64.zip"
          Write-Host "  - Rathalos-Distributed-$version-win-x64.zip"
          Write-Host "  - Rathalos-Launcher-$version-win-x86.zip"

      - name: Set Release Tag
        id: release_tag
        run: |
          if ($env:RELEASE_VERSION) {
            $tag = $env:RELEASE_VERSION
          } elseif ($env:GITHUB_REF -match 'refs/tags/(.*)') {
            $tag = $matches[1]
          } else {
            $tag = "dev"
          }
          Write-Host "Release tag: $tag"
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.TAG }}
          files: |
            Rathalos-CLI-*.zip
            Rathalos-World-*.zip
            Rathalos-Distributed-*.zip
            Rathalos-Launcher-*.zip
            release/README.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.release_tag.outputs.TAG, 'alpha') || contains(steps.release_tag.outputs.TAG, 'beta') || contains(steps.release_tag.outputs.TAG, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
