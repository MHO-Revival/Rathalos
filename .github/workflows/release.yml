name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  release:
    name: Create Release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and Push Tag (Manual Trigger Only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          $version = "${{ github.event.inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a $version -m "Release $version"
          git push origin $version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup C++ Build Tools
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Build C++ Launcher
        working-directory: Tools/mho_launcher_cpp
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A Win32
          cmake --build build --config Release

      - name: Publish CLI (Windows x86)
        run: |
          dotnet publish Tools/Rathalos.CLI/Rathalos.CLI.csproj `
            -c Release `
            -r win-x86 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o release/CLI

      - name: Publish World Console (Windows x64)
        run: |
          dotnet publish GUI/Rathalos.ConsoleUI.World/Rathalos.ConsoleUI.World.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o release/World

      - name: Publish Distributed (Windows x64)
        run: |
          dotnet publish GUI/Rathalos.Distributed/Rathalos.Distributed.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o release/Distributed

      - name: Copy C++ Launcher
        run: |
          New-Item -ItemType Directory -Force -Path release/Launcher
          Copy-Item -Path Tools/mho_launcher_cpp/build/Release/*.exe -Destination release/Launcher/
          Copy-Item -Path Tools/mho_launcher_cpp/build/Release/*.dll -Destination release/Launcher/ -ErrorAction SilentlyContinue

      - name: Create Release Package
        run: |
          # Get version from tag or manual input
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ github.event.inputs.version }}"
          } elseif ($env:GITHUB_REF -match 'refs/tags/(.*)') {
            $version = $matches[1]
          } else {
            $version = "dev"
          }

          # Create README
          @"
          # Rathalos Release - $version

          ## Contents

          - **CLI/** - Command-line interface tool
          - **World/** - World server console UI
          - **Distributed/** - Distributed management UI
          - **Launcher/** - MHO game launcher

          ## Usage

          Run the executables directly:
          - CLI: ``CLI/Rathalos.CLI.exe``
          - World: ``World/Rathalos.ConsoleUI.World.exe``
          - Distributed: ``Distributed/Rathalos.Distributed.exe``
          - Launcher: ``Launcher/mho_launcher.exe``

          All executables are self-contained and do not require .NET to be installed.
          
          ## Support
          
          - GitHub: https://github.com/MHO-Revival/Rathalos
          - Issues: https://github.com/MHO-Revival/Rathalos/issues
          "@ | Out-File -FilePath release/README.txt -Encoding UTF8
          
          # Create zip
          Compress-Archive -Path release/* -DestinationPath "Rathalos-$version-win-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Rathalos-*.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
