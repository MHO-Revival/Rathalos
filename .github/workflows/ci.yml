name: CI Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build:
    name: Build and Test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup C++ Build Tools
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Build C++ Launcher
        working-directory: Tools/mho_launcher_cpp
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A Win32
          cmake --build build --config Release

      - name: Restore .NET Dependencies
        run: dotnet restore Rathalos.slnx -p:Configuration=Release -p:Platform="Any CPU"

      - name: Build CLI
        run: dotnet build Tools/Rathalos.CLI/Rathalos.CLI.csproj -c Release --no-restore

      - name: Build World Console
        run: dotnet build GUI/Rathalos.ConsoleUI.World/Rathalos.ConsoleUI.World.csproj -c Release --no-restore

      - name: Build Distributed
        run: dotnet build GUI/Rathalos.Distributed/Rathalos.Distributed.csproj -c Release --no-restore

      - name: Run Tests
        run: dotnet test Rathalos.slnx -c Release --no-restore -p:Platform="Any CPU" --verbosity normal
        continue-on-error: true
